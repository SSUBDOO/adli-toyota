<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Toyota Monthly Calculator - ADLI TOYOTA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box}
:root{
  --toyota-red:#e4002b;
  --toyota-dark:#111111;
  --toyota-black:#000000;
  --toyota-grey:#f1f2f4;
  --toyota-silver:#d8dadd;
  --toyota-text:#151515;
}
body{
  margin:0;
  background:
    radial-gradient(circle at top right, rgba(228,0,43,.13), transparent 28%),
    linear-gradient(180deg,#f7f7f8 0%,#e9eaec 100%);
  font-family:Arial,sans-serif;
  color:var(--toyota-text);
}
.wrap{max-width:620px;margin:0 auto;padding:10px 10px 82px}
.header{
  background:linear-gradient(135deg,var(--toyota-black) 0%,#202020 54%,var(--toyota-red) 55%,#b80022 100%);
  color:#fff;
  border-radius:20px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 10px 26px rgba(0,0,0,.18);
  border:1px solid rgba(255,255,255,.12);
}
.headerInner{display:flex;align-items:center;justify-content:space-between;gap:12px}
.headerText{flex:1;text-align:left}
.header h1{
  font-size:22px;
  margin:0 0 7px;
  line-height:1.08;
  letter-spacing:.8px;
  font-weight:900;
  text-transform:uppercase;
}
.header p{
  display:inline-block;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.18);
  border-radius:999px;
  padding:5px 10px;
  font-size:12px;
  margin:0;
  opacity:.96;
  font-weight:900;
  letter-spacing:.8px;
}
.headerLogo{
  width:78px;
  height:78px;
  background:#fff;
  border-radius:18px;
  padding:7px;
  object-fit:contain;
  box-shadow:0 5px 16px rgba(0,0,0,.24);
}
.panel,.quote{
  background:rgba(255,255,255,.94);
  border-radius:18px;
  padding:15px;
  border:1px solid rgba(0,0,0,.07);
  box-shadow:0 8px 20px rgba(0,0,0,.07);
  margin-bottom:12px;
}
.panel{
  border-top:5px solid var(--toyota-red);
}
.quote{
  border-top:5px solid var(--toyota-dark);
}
label{
  display:block;
  margin-top:11px;
  font-size:11px;
  font-weight:900;
  color:#444;
  letter-spacing:2px;
  text-transform:uppercase;
}
select,input{
  width:100%;
  margin-top:6px;
  padding:12px;
  border:1.5px solid var(--toyota-silver);
  border-radius:13px;
  background:#fff;
  font-size:16px;
  font-weight:900;
  color:#111;
  box-shadow:inset 0 1px 0 rgba(0,0,0,.03);
}
select:focus,input:focus{
  outline:none;
  border-color:var(--toyota-red);
  box-shadow:0 0 0 4px rgba(228,0,43,.12);
}
select option{color:#111;background:#fff}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.moneyWrap{position:relative}
.moneyWrap .rmPrefix{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  font-size:15px;
  font-weight:900;
  color:#666;
  pointer-events:none;
  z-index:2;
}
.moneyWrap input{padding-left:48px}
.method{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.method input{display:none}
.method label{
  margin:0;
  padding:11px;
  text-align:center;
  border:1.5px solid var(--toyota-silver);
  border-radius:13px;
  text-transform:none;
  letter-spacing:0;
  font-size:13px;
  cursor:pointer;
  background:#fff;
  color:#333;
}
.method input:checked+label{
  background:linear-gradient(135deg,var(--toyota-red),#b80022);
  color:#fff;
  border-color:var(--toyota-red);
  box-shadow:0 5px 14px rgba(228,0,43,.22);
}
.smallHint{font-size:10px;color:#777;margin-top:6px;line-height:1.35}
.quoteTop{
  display:flex;
  justify-content:flex-start;
  align-items:flex-start;
  gap:12px;
  background:linear-gradient(135deg,#111,#2b2b2b);
  color:#fff;
  border-radius:16px;
  padding:14px;
  margin:-3px -3px 12px;
}
.modelTitle{
  font-size:30px;
  font-weight:900;
  letter-spacing:.4px;
  line-height:1.1;
  color:#fff;
  text-transform:uppercase;
  display:flex;
  flex-wrap:wrap;
  align-items:baseline;
  gap:8px;
}
.modelTitle .variantBig{
  display:inline;
  font-size:21px;
  color:#fff;
  margin-top:0;
  letter-spacing:.2px;
  opacity:.92;
}
.variantTitle{
  font-size:13px;
  color:#fff;
  font-weight:900;
  margin-top:8px;
  background:var(--toyota-red);
  display:inline-block;
  padding:5px 9px;
  border-radius:999px;
}
.carBox{
  width:92px;
  height:62px;
  border-radius:14px;
  background:#fff;
  color:var(--toyota-red);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:13px;
  flex-shrink:0;
  text-align:center;
  line-height:1.3;
}
.sectionTitle{
  font-size:14px;
  font-weight:900;
  color:#222;
  margin:14px 0 8px;
  display:flex;
  align-items:center;
  gap:7px;
  text-transform:uppercase;
  letter-spacing:.5px;
}
.sectionTitle:before{
  content:"";
  width:6px;
  height:25px;
  background:var(--toyota-red);
  border-radius:99px;
}
.monthlyBox{margin-top:12px;display:grid;gap:8px}
.monthlyItem{
  display:grid;
  grid-template-columns:92px 1fr;
  align-items:center;
  border:1.5px solid var(--toyota-silver);
  border-radius:14px;
  overflow:hidden;
  background:#fff;
}
.monthlyItem .year{
  background:#1a1a1a;
  color:#fff;
  padding:13px;
  text-align:center;
  font-weight:900;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1.2;
}
.monthlyItem .amount{
  padding:12px 14px;
  text-align:right;
  font-size:25px;
  font-weight:900;
  color:var(--toyota-red);
}
.monthlyItem.best{
  border-color:var(--toyota-red);
  box-shadow:0 5px 16px rgba(228,0,43,.14);
}
.monthlyItem.best .year{background:var(--toyota-red);color:#fff}
.row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  padding:8px 0;
  border-bottom:1px dashed #d9d9d9;
  font-size:14px;
  align-items:center;
}
.row span:first-child{color:#555;font-weight:800}
.row strong{text-align:right;font-size:15px}
.green{color:#138a36}.blue{color:#e4002b}
.note{
  font-size:10px;
  color:#777;
  line-height:1.35;
  text-align:center;
  margin-top:12px;
  background:#f7f7f7;
  padding:9px;
  border-radius:12px;
}
.financeBottom{margin-top:12px;border-top-color:var(--toyota-dark)}
.financeBottom label:first-child{margin-top:0}
.wa{
  position:fixed;
  left:10px;
  right:10px;
  bottom:10px;
  max-width:600px;
  margin:auto;
  display:block;
  background:linear-gradient(135deg,#25d366,#128c3a);
  color:white;
  text-align:center;
  text-decoration:none;
  padding:14px;
  border-radius:14px;
  font-weight:900;
  box-shadow:0 8px 20px rgba(0,0,0,.20);
  font-size:16px;
}
@media(max-width:430px){
  .wrap{padding:10px 10px 78px}
  .header{padding:14px;border-radius:18px}
  .headerLogo{width:68px;height:68px;border-radius:14px;padding:6px}
  .header h1{font-size:18px;letter-spacing:.4px}
  .header p{font-size:11px;padding:4px 8px}
  .panel,.quote{padding:13px;border-radius:16px}
  .modelTitle{font-size:26px}
  .modelTitle .variantBig{font-size:19px}
  select,input{font-size:16px;padding:11px}
  .row{font-size:13px}
  .row strong{font-size:14px}
  .monthlyItem{grid-template-columns:82px 1fr}
  .monthlyItem .amount{font-size:22px}
}
</style>
</head>

    <div class="method">
      <input type="radio" name="method" id="flat" value="flat" checked><label for="flat">Flat Rate</label>
      <input type="radio" name="method" id="eir" value="eir"><label for="eir">EIR</label>
    </div>

    <div class="grid2">
      <div><label id="rateLabel">Flat Rate %</label><input id="rate" type="number" value="2.30" step="0.01"></div>

  </div>

<a class="wa" id="waBtn" href="#" target="_blank">Send quote ke WhatsApp</a>

<script>
const salesPhone = "60107971077";

const els = {
  car: document.getElementById("car"),
  discountSelect: document.getElementById("discountSelect"),
  discountWrap: document.getElementById("discountWrap"),
  discount: document.getElementById("discount"),
  deposit: document.getElementById("deposit"),
  insurance: document.getElementById("insurance"),
  ncd: document.getElementById("ncd"),
  accessories: document.getElementById("accessories"),
  rate: document.getElementById("rate"),
  rateLabel: document.getElementById("rateLabel"),
  quote: document.getElementById("quote"),
  waBtn: document.getElementById("waBtn")
};

function rm(value, cents=false){
  return "RM" + Number(value).toLocaleString("en-MY", {
    minimumFractionDigits: cents ? 2 : 0,
    maximumFractionDigits: cents ? 2 : 0
  });
}

function numEl(el){
  const value = Number(el.value);
  return Number.isFinite(value) ? value : 0;
}

function selectedCar(){
  const opt = els.car.options[els.car.selectedIndex];
  return {
    model: opt.dataset.model,
    variant: opt.dataset.variant,
    price: Number(opt.dataset.price) || 0,
    insurance: Number(opt.dataset.insurance) || 0
  };
}

function setInsuranceFromCar(){
  els.insurance.value = selectedCar().insurance;
}

function getMethod(){
  return document.querySelector('input[name="method"]:checked').value;
}

function methodName(){
  return getMethod() === "eir" ? "EIR" : "Flat Rate";
}

function getDiscount(){
  const value = els.discountSelect.value;
  if(value === "custom"){
    els.discountWrap.style.display = "block";
    return Math.max(numEl(els.discount), 0);
  }
  els.discountWrap.style.display = "none";
  els.discount.value = value;
  return Math.max(Number(value), 0);
}

function updateMethodUI(){
  if(getMethod() === "eir"){
    els.rateLabel.textContent = "EIR %";
    if(numEl(els.rate) < 3) els.rate.value = "4.40";
  } else {
    els.rateLabel.textContent = "Flat Rate %";
    if(numEl(els.rate) > 3.5) els.rate.value = "2.30";
  }
}

function monthlyFlat(loan, rate, years){
  const months = years * 12;
  if(loan <= 0 || months <= 0) return 0;
  const interest = loan * (rate / 100) * years;
  return (loan + interest) / months;
}

function monthlyEir(loan, rate, years){
  const months = years * 12;
  const r = (rate / 100) / 12;
  if(loan <= 0 || months <= 0) return 0;
  if(r <= 0) return loan / months;
  return loan * r / (1 - Math.pow(1 + r, -months));
}

function monthlyCalc(loan, rate, years){
  return getMethod() === "eir" ? monthlyEir(loan, rate, years) : monthlyFlat(loan, rate, years);
}

function totalInterest(loan, monthly, years){
  return Math.max((monthly * years * 12) - loan, 0);
}

function render(){
  updateMethodUI();

  const car = selectedCar();
  const model = car.model;
  const variant = car.variant;
  const sellingPrice = car.price;

  const discount = getDiscount();
  const deposit = Math.max(numEl(els.deposit), 0);
  const insuranceGross = Math.max(numEl(els.insurance), 0);
  const ncd = Math.min(Math.max(numEl(els.ncd), 0), 100);
  const accessories = Math.max(numEl(els.accessories), 0);
  const rate = Math.max(numEl(els.rate), 0);

  const ncdValue = insuranceGross * (ncd / 100);
  const insuranceAfterNcd = Math.max(insuranceGross - ncdValue, 0);
  const waiverCompulsoryExcess = insuranceAfterNcd > 0 ? 25 : 0;
  const insuranceSubtotal = insuranceAfterNcd + waiverCompulsoryExcess;
  const serviceTax = insuranceSubtotal * 0.08;
  const stampDuty = insuranceAfterNcd > 0 ? 10 : 0;
  const insurancePayable = insuranceSubtotal + serviceTax + stampDuty;
  const afterRebate = Math.max(sellingPrice - discount, 0);
  const priceAfterAddOn = afterRebate + insurancePayable + accessories;
  const loan = Math.max(priceAfterAddOn - deposit, 0);

  const m5 = monthlyCalc(loan, rate, 5);
  const m7 = monthlyCalc(loan, rate, 7);
  const m9 = monthlyCalc(loan, rate, 9);

  const interest9 = totalInterest(loan, m9, 9);
  

  els.quote.innerHTML = `
    <div class="quoteTop">
      <div>
        <div class="modelTitle">${model}<span class="variantBig">${variant}</span></div>
      </div>
    </div>

    <div class="sectionTitle">Monthly Payment</div>
    <div class="monthlyBox">
      <div class="monthlyItem best"><div class="year">9<br>YEARS</div><div class="amount">${rm(m9,true)}</div></div>
      <div class="monthlyItem"><div class="year">7<br>YEARS</div><div class="amount">${rm(m7,true)}</div></div>
      <div class="monthlyItem"><div class="year">5<br>YEARS</div><div class="amount">${rm(m5,true)}</div></div>
    </div>

    <div class="sectionTitle">Price Breakdown</div>
    <div class="row"><span>Selling Price</span><strong>${rm(sellingPrice,true)}</strong></div>
    <div class="row"><span>Insurance Before NCD</span><strong>${rm(insuranceGross,true)}</strong></div>
    <div class="row"><span>NCD ${ncd.toFixed(2)}%</span><strong class="green">-${rm(ncdValue,true)}</strong></div>
    <div class="row"><span>Insurance After NCD</span><strong>${rm(insuranceAfterNcd,true)}</strong></div>
    <div class="row"><span>Total Insurance Payable</span><strong>${rm(insurancePayable,true)}</strong></div>
    <div class="row"><span>Discount / Rebate</span><strong class="green">-${rm(discount,true)}</strong></div>
    <div class="row"><span>Accessories</span><strong>${rm(accessories,true)}</strong></div>
    <div class="row"><span>Price After Add-on</span><strong>${rm(priceAfterAddOn,true)}</strong></div>
    <div class="row"><span>Deposit</span><strong class="blue">-${rm(deposit,true)}</strong></div>
    <div class="row"><span>Loan Amount</span><strong>${rm(loan,true)}</strong></div>
    <div class="row"><span>Interest Estimate 9 Years</span><strong>${rm(interest9,true)}</strong></div>
    

    <div class="note">Anggaran sahaja. Insurance: After NCD + Waiver Compulsory Excess RM25, kemudian Service Tax 8% + Stamp Duty RM10. Final approval, exact rate, insurance, fees dan loan margin tertakluk kepada bank.</div>
  `;

  const msg =
`ADLI TOYOTA%0AToyota Monthly Calculator%0A%0A` +
`${model} ${variant}%0A%0A` +
`Selling Price: ${rm(sellingPrice,true)}%0A` +
`Discount/Rebate: -${rm(discount,true)}%0A` +
`Price After Discount: ${rm(afterRebate,true)}%0A%0A` +
`Insurance Before NCD: ${rm(insuranceGross,true)}%0A` +
`NCD ${ncd.toFixed(0)}%: -${rm(ncdValue,true)}%0A` +
`Insurance After NCD: ${rm(insuranceAfterNcd,true)}%0A` +
`Total Insurance Payable: ${rm(insurancePayable,true)}%0A%0A` +
`Accessories: ${rm(accessories,true)}%0A` +
`Price After Add-on: ${rm(priceAfterAddOn,true)}%0A` +
`Deposit: -${rm(deposit,true)}%0A` +
`Loan Amount: ${rm(loan,true)}%0A%0A` +
`${methodName()}: ${rate.toFixed(2)}%25%0A` +
`9Y: ${rm(m9,true)}%0A` +
`7Y: ${rm(m7,true)}%0A` +
`5Y: ${rm(m5,true)}`;
  els.waBtn.href = `https://wa.me/${salesPhone}?text=${msg}`;
}

setInsuranceFromCar();

els.car.addEventListener("change", () => {
  setInsuranceFromCar();
  render();
});

document.querySelectorAll("input,select").forEach(el => {
  if(el !== els.car){
    el.addEventListener("input", render);
    el.addEventListener("change", render);
  }
});

render();
</script>
</body>
